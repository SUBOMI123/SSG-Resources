version: '3.8'

services:
  postgres:
    image: postgres:17-alpine
    container_name: ssg_postgres
    environment:
      POSTGRES_USER: ssg_user
      POSTGRES_PASSWORD: ssg_password
      POSTGRES_DB: ssg_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ssg_user -d ssg_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ssg_network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ssg_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - ssg_network

volumes:
  postgres_data:

networks:
  ssg_network:
